services:
  api-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL_MINUTES=${JWT_ACCESS_TTL_MINUTES}
      - JWT_REFRESH_TTL_DAYS=${JWT_REFRESH_TTL_DAYS}
      - API_PORT=${API_PORT}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${API_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      migrate-appdb:
        condition: service_completed_successfully
      migrate-metricsdb:
        condition: service_completed_successfully

  device-service:
    build:
      context: .
      dockerfile: device-service/Dockerfile
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CONTROL_STALE_THRESHOLD_SECONDS=${CONTROL_STALE_THRESHOLD_SECONDS}
      - CONTROL_TICK_INTERVAL_SECONDS=${CONTROL_TICK_INTERVAL_SECONDS}
      - CONTROL_CACHE_REFRESH_MINUTES=${CONTROL_CACHE_REFRESH_MINUTES}
      - MQTT_DEVICE_SERVICE_USERNAME=${MQTT_DEVICE_SERVICE_USERNAME}
      - MQTT_DEVICE_SERVICE_PASSWORD=${MQTT_DEVICE_SERVICE_PASSWORD}
      - DEVICE_DEBUG=${DEVICE_DEBUG:-}
      - DEVICE_TRACE_INGESTION=${DEVICE_TRACE_INGESTION:-false}
      - DEVICE_TRACE_TICK=${DEVICE_TRACE_TICK:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      migrate-appdb:
        condition: service_completed_successfully
      migrate-metricsdb:
        condition: service_completed_successfully

  simulator-service:
    profiles: ["simulation"]
    command: ["./bin/simulator-service", "--simulation=${SIMULATOR_SIMULATION:-default}"]
    build:
      context: .
      dockerfile: simulator-service/Dockerfile
    environment:
      - SIMULATOR_EMAIL=${SIMULATOR_EMAIL}
      - SIMULATOR_PASSWORD=${SIMULATOR_PASSWORD}
      - MQTT_DEVICE_USERNAME=${MQTT_DEVICE_USERNAME}
      - MQTT_DEVICE_PASSWORD=${MQTT_DEVICE_PASSWORD}
      - CONTROL_TICK_INTERVAL_SECONDS=${CONTROL_TICK_INTERVAL_SECONDS}
    volumes:
      - ./simulator-service/config:/app/config
    depends_on:
      api-service:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-client/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      api-service:
        condition: service_healthy