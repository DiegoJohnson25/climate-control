worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------

    # Limit by connecting IP. Zone size 10m holds ~160,000 unique IPs.
    # Rate is intentionally loose — this is a framework, not a strict guard.
    # Tune before any public deployment.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ---------------------------------------------------------------------------
    # Upstream
    # ---------------------------------------------------------------------------

    # Docker DNS resolves api-service to all running container IPs.
    # Round-robin load balancing across instances is automatic — no instance
    # enumeration needed. Scale via: docker compose up --scale api-service=N.
    #
    # Note: NGINX resolves upstream DNS once at startup. Instances added after
    # NGINX starts will not be picked up until NGINX restarts. Acceptable for
    # a dev/demo context — use the resolver directive with a short TTL for
    # production dynamic scaling.
    upstream api {
        server api-service:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------------------------------------------------
        # API proxy
        # -------------------------------------------------------------------

        location /api/ {
            # No trailing slash on proxy_pass — preserves the full URI
            # including the /api/ prefix. api-service routes are registered
            # as /api/v1/... so the prefix must not be stripped.
            proxy_pass http://api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Loose burst to allow Postman collection runs and load testing
            # from a single IP without hitting the limit.
            limit_req zone=api burst=60 nodelay;
        }

        # -------------------------------------------------------------------
        # React SPA static files
        # -------------------------------------------------------------------

        location / {
            root /usr/share/nginx/html;

            # Cache-busted assets (hashed filenames from Vite) can be cached
            # aggressively — a new build produces a new filename, so stale
            # content is impossible.
            location ~* \.(?:js|css)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # index.html must never be stale — it references the current
            # hashed asset filenames. Always revalidate.
            add_header Cache-Control "no-cache";

            # React Router fallback — direct navigation to any client-side
            # route (e.g. /rooms/abc) serves index.html so React can boot
            # and handle the route. Without this, NGINX returns 404.
            try_files $uri $uri/ /index.html;
        }
    }
}