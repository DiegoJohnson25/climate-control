worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;

    server {
        listen 80;
        server_name localhost;

        # -------------------------------------------------------------------
        # React SPA static files
        # -------------------------------------------------------------------

        location / {
            root /usr/share/nginx/html;

            # Cache-busted assets (hashed filenames from Vite) can be cached
            # aggressively — a new build produces a new filename, so stale
            # content is impossible.
            location ~* \.(?:js|css)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # index.html must never be stale — it references the current
            # hashed asset filenames. Always revalidate.
            add_header Cache-Control "no-cache";

            # React Router fallback — direct navigation to any client-side
            # route (e.g. /rooms/abc) serves index.html so React can boot
            # and handle the route. Without this, NGINX returns 404.
            try_files $uri $uri/ /index.html;
        }
    }
}