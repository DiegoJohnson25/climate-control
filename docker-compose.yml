services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.25.2-pg17
    environment:
      - POSTGRES_USER=${TIMESCALE_USER}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD}
      - POSTGRES_DB=${TIMESCALE_DB}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "${TIMESCALE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    user: root
    volumes:
      - ./deployments/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deployments/mosquitto/passwd:/mosquitto/config/passwd
      - ./deployments/mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "${MQTT_PORT}:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t 'healthcheck' -m 'ping' -q 0 -u healthcheck -P healthcheck -i healthcheck-probe && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate-appdb:
    image: migrate/migrate
    volumes:
      - ./migrations/appdb:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  migrate-metricsdb:
    image: migrate/migrate
    volumes:
      - ./migrations/metricsdb:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/${TIMESCALE_DB}?sslmode=disable",
      "up"
    ]
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  timescaledb_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs: