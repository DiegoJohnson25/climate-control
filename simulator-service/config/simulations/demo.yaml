# simulator-service/config/simulations/demo.yaml
#
# Realistic multi-user simulation intended for demonstration and historical
# data generation. All rooms are reactive and noisy.
#
# Four users across a 2x2 matrix of device configuration and control mechanism:
#
#   user-000 — single sensor per type, desired state (indefinite override)
#   user-001 — multiple sensors per type, desired state (indefinite override)
#   user-002 — single sensor per type, schedules
#   user-003 — multiple sensors per type, schedules
#
# user-000 and user-002 share the same room and device topology. user-001 and
# user-003 share the same room and device topology (exercises sensor aggregation).
#
# All user groups are interactive — credentials written to
# /app/config/credentials/demo.txt for manual login via the client.

simulation:
  time_scale: 10
  user_groups:

    # user-000: single sensor per type, desired state
    - count: 1
      interactive: true
      rooms:
        - template: standard-room
          name_prefix: living-room
          type: reactive
          noisy: true
          count: 1
          desired_state: comfort
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1
        - template: warm-room
          name_prefix: bedroom
          type: reactive
          noisy: true
          count: 1
          desired_state: warm
          devices:
            - template: temp-sensor
              name_prefix: temp-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
        - template: cold-room
          name_prefix: basement
          type: reactive
          noisy: true
          count: 1
          desired_state: cool
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1

    # user-001: multiple sensors per type, desired state (exercises aggregation)
    - count: 1
      interactive: true
      rooms:
        - template: standard-room
          name_prefix: living-room
          type: reactive
          noisy: true
          count: 1
          desired_state: comfort
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1
        - template: warm-room
          name_prefix: bedroom
          type: reactive
          noisy: true
          count: 1
          desired_state: warm
          devices:
            - template: temp-sensor
              name_prefix: temp-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
        - template: cold-room
          name_prefix: basement
          type: reactive
          noisy: true
          count: 1
          desired_state: cool
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1

    # user-002: single sensor per type, schedules
    - count: 1
      interactive: true
      rooms:
        - template: standard-room
          name_prefix: living-room
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-comfort
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1
        - template: warm-room
          name_prefix: bedroom
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-comfort-temp
          devices:
            - template: temp-sensor
              name_prefix: temp-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
        - template: cold-room
          name_prefix: basement
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-comfort
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1

    # user-003: multiple sensors per type, schedules (exercises aggregation)
    - count: 1
      interactive: true
      rooms:
        - template: standard-room
          name_prefix: living-room
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-work-pattern
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1
        - template: warm-room
          name_prefix: bedroom
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-work-pattern-temp
          devices:
            - template: temp-sensor
              name_prefix: temp-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
        - template: cold-room
          name_prefix: basement
          type: reactive
          noisy: true
          count: 1
          schedule: weekday-work-pattern
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 2
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1