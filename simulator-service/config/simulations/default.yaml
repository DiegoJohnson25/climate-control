simulation:
  tick_interval_seconds: 5

  user_groups:
    - count: 1
      interactive: true
      rooms:
        - template: standard-room
          name_prefix: standard-room
          count: 1
          devices:
            - template: climate-sensor
              name_prefix: climate-sensor
              count: 1
            - template: heater
              name_prefix: heater
              count: 1
            - template: humidifier
              name_prefix: humidifier
              count: 1