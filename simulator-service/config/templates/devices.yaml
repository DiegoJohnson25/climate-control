device_templates:

  # ---------------------------------------------------------------------------
  # Sensor-only devices
  # ---------------------------------------------------------------------------

  - id: climate-sensor
    sensors:
      - type: temperature
        noise: 0.2
        offset: 0.0
      - type: humidity
        noise: 1.0
        offset: 0.0

  - id: temp-sensor
    sensors:
      - type: temperature
        noise: 0.2
        offset: 0.0

  - id: humidity-sensor
    sensors:
      - type: humidity
        noise: 1.0
        offset: 0.0

  - id: air-quality-sensor
    sensors:
      - type: air_quality
        noise: 5.0
        offset: 0.0

  # ---------------------------------------------------------------------------
  # Actuator-only devices
  # ---------------------------------------------------------------------------

  - id: heater
    actuators:
      - type: temperature
        rate_scale: 1.0

  - id: humidifier
    actuators:
      - type: humidity
        rate_scale: 1.0

  # ---------------------------------------------------------------------------
  # Combined sensor and actuator devices
  # ---------------------------------------------------------------------------

  - id: temp-heater
    sensors:
      - type: temperature
        noise: 0.2
        offset: 0.0
    actuators:
      - type: temperature
        rate_scale: 1.0

  - id: humidity-humidifier
    sensors:
      - type: humidity
        noise: 1.0
        offset: 0.0
    actuators:
      - type: humidity
        rate_scale: 1.0

  - id: climate-controller
    sensors:
      - type: temperature
        noise: 0.2
        offset: 0.0
      - type: humidity
        noise: 1.0
        offset: 0.0
    actuators:
      - type: temperature
        rate_scale: 1.0
      - type: humidity
        rate_scale: 1.0
